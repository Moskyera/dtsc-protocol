[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
via_ir = false

[profile.default.fuzz]
runs = 512

[profile.default.invariant]
runs = 128
depth = 32

[profile.ci]
fuzz = { runs = 4096 }
invariant = { runs = 512, depth = 64 }

[rpc_endpoints]
pulsechain = "${PULSECHAIN_RPC_URL}"

[etherscan]
pulsechain = { key = "${PULSESCAN_API_KEY}", url = "https://api.scan.pulsechain.com/api" }